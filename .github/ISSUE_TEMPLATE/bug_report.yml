name: Bug report
description: A defect in sigmalint itself (not a false positive in a rule)
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations: { required: true }
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Paste the Sigma YAML and the exact command you ran.
      render: shell
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: sigmalint version
      description: Output of `sigmalint --version`
    validations: { required: true }
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
    validations: { required: true }
