name: Feature request
description: A new capability that is not a new rule
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this solve? Who would use it?
    validations: { required: true }
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: Sketch the user-facing surface (CLI flag, config key, output field, etc.).
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
