title: TAX003 positive - one canonical, one alias - only the alias fires
# `Image` is canonical (no finding). `ImagePath` is an alias for Image
# (one finding). Documents that the rule does not erroneously fire on
# the canonical name when an alias appears alongside it.
logsource:
    category: process_creation
detection:
    selection:
        Image: cmd.exe
        ImagePath: powershell.exe
    condition: selection
