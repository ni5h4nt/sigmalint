title: Detect cmd execution bad style
id: a3b2c3d4-1111-4222-8333-444444444444
status: stable
description: A hand-written rule with mixed-case top-level keys and weird indentation.
author: Compound Tester
date: '2026-05-23'
references:
  - https://example.com/style
License: MIT
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        ImagePath: 'C:\Windows\System32\cmd.exe'
        BogusFieldXyz: anything
    filter:
        ParentImage|endswith: '\explorer.exe'
    condition: selection and not filter
falsepositives:
  - Legitimate admin activity
level: medium
tags:
  - attack.t1059.003
